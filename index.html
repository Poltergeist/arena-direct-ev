<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Direct EV Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 {
      color: #a78bfa;
    }
    label {
      display: block;
      margin-top: 16px;
      font-weight: bold;
    }
    input[type="number"] {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #2d2d44;
      color: #e0e0e0;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      padding: 10px 24px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #6d28d9;
    }
    #result {
      margin-top: 24px;
      padding: 16px;
      background: #2d2d44;
      border-radius: 6px;
      display: none;
    }
    #result h2 {
      margin-top: 0;
      color: #a78bfa;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    th, td {
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid #444;
    }
    th {
      color: #a78bfa;
    }
  </style>
</head>
<body>
  <h1>Arena Direct EV Calculator</h1>
  <p>Calculate the expected value of an Arena Direct run based on your estimated win rate.</p>

  <label for="winrate">Win Rate (0–100%)</label>
  <input type="number" id="winrate" min="0" max="100" step="1" value="50" />

  <label for="entryCost">Entry Cost (gems)</label>
  <input type="number" id="entryCost" min="0" step="100" value="1500" />

  <button onclick="calculate()">Calculate EV</button>

  <div id="result">
    <h2>Results</h2>
    <table id="resultsTable">
      <thead>
        <tr><th>Wins</th><th>Probability</th><th>Reward (gems)</th><th>Weighted EV</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <p id="totalEV"></p>
    <p id="netEV"></p>
  </div>

  <script>
    // Arena Direct reward table (gems) indexed by number of wins (0–7)
    const REWARDS = [50, 100, 200, 500, 1000, 1500, 2000, 2500];

    function binomialCoeff(n, k) {
      if (k < 0 || k > n) return 0;
      if (k === 0 || k === n) return 1;
      let result = 1;
      for (let i = 0; i < k; i++) {
        result = result * (n - i) / (i + 1);
      }
      return result;
    }

    // P(exactly w wins before 3 losses) in a best-of-X style limited run
    // Arena Direct: play until 7 wins or 3 losses
    function probability(wins, p) {
      const q = 1 - p;
      if (wins === 7) {
        // At least 7 wins before 3 losses:
        // reach 7 wins with 0, 1, or 2 losses along the way
        let prob = 0;
        for (let losses = 0; losses <= 2; losses++) {
          // last game must be a win, so arrange (losses) losses in first (7+losses-1) games
          prob += binomialCoeff(6 + losses, losses) * Math.pow(p, 7) * Math.pow(q, losses);
        }
        return prob;
      } else {
        // Exactly `wins` wins, then 3rd loss on game (wins + 3)
        // last game is a loss, arrange 2 losses in first (wins + 2) games
        return binomialCoeff(wins + 2, 2) * Math.pow(p, wins) * Math.pow(q, 3);
      }
    }

    function calculate() {
      const winratePct = parseFloat(document.getElementById('winrate').value);
      const entryCost = parseFloat(document.getElementById('entryCost').value);
      const p = Math.max(0, Math.min(1, winratePct / 100));

      const tbody = document.querySelector('#resultsTable tbody');
      tbody.innerHTML = '';

      let totalEV = 0;
      for (let w = 0; w <= 7; w++) {
        const prob = probability(w, p);
        const reward = REWARDS[w];
        const weighted = prob * reward;
        totalEV += weighted;

        const row = document.createElement('tr');
        row.innerHTML = `<td>${w}</td><td>${(prob * 100).toFixed(2)}%</td><td>${reward}</td><td>${weighted.toFixed(1)}</td>`;
        tbody.appendChild(row);
      }

      const netEV = totalEV - entryCost;
      document.getElementById('totalEV').textContent = `Total EV: ${totalEV.toFixed(1)} gems`;
      document.getElementById('netEV').textContent = `Net EV (after ${entryCost} gem entry): ${netEV.toFixed(1)} gems`;
      document.getElementById('result').style.display = 'block';
    }
  </script>
</body>
</html>
